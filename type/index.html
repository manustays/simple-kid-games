<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a0533" />
  <title>Number Fun!</title>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0a1e;
      --c1: #ff4d6d;
      --c2: #ff9f1c;
      --c3: #2ec4b6;
      --c4: #a8dadc;
      --c5: #c77dff;
      --c6: #f72585;
      --c7: #7bdff2;
      --c8: #b2f7ef;
      --c9: #ffe74c;
      --c0: #6aff6a;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Fredoka One', cursive;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* Starfield bg */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 40%, #fff 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 50% 10%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 30%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 60%, #fff 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 15% 80%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 70%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 85%, #fff 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 90% 90%, #fff 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: fixed; inset: 0;
      display: flex;
      flex-direction: column;
      z-index: 1;
    }

    /* ── Display area ── */
    #display {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px 8px;
      overflow: hidden;
      position: relative;
    }

    #digits-wrap {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
    }

    .digit-char {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(52px, 13vw, 110px);
      line-height: 1;
      display: inline-block;
      animation: pop 0.35s cubic-bezier(0.36, 1.56, 0.64, 1) both;
      filter: drop-shadow(0 4px 12px currentColor);
    }

    @keyframes pop {
      0%   { transform: scale(0) rotate(-15deg); opacity: 0; }
      60%  { transform: scale(1.25) rotate(6deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .digit-char:nth-child(10n+1)  { color: var(--c1); }
    .digit-char:nth-child(10n+2)  { color: var(--c2); }
    .digit-char:nth-child(10n+3)  { color: var(--c3); }
    .digit-char:nth-child(10n+4)  { color: var(--c4); }
    .digit-char:nth-child(10n+5)  { color: var(--c5); }
    .digit-char:nth-child(10n+6)  { color: var(--c6); }
    .digit-char:nth-child(10n+7)  { color: var(--c7); }
    .digit-char:nth-child(10n+8)  { color: var(--c8); }
    .digit-char:nth-child(10n+9)  { color: var(--c9); }
    .digit-char:nth-child(10n+0)  { color: var(--c0); }

    /* ── Keyboard ── */
    #keyboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
      gap: 10px;
      padding: 10px 12px 14px;
      background: rgba(255,255,255,0.04);
      border-top: 2px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
    }

    @media (max-width: 700px) {
      #keyboard {
        max-width: 100%;
        width: 100%;
        gap: 8px;
        padding: 8px 10px 12px;
      }
    }

    .key {
      aspect-ratio: 1.3 / 1;
      border-radius: 18px;
      border: none;
      cursor: pointer;
      font-family: 'Fredoka One', cursive;
      font-size: clamp(28px, 7vw, 56px);
      font-weight: 900;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      outline: none;
      transition: transform 0.08s, filter 0.08s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      box-shadow: 0 6px 0 rgba(0,0,0,0.35), 0 2px 12px rgba(0,0,0,0.3);
    }

    .key::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.15);
      border-radius: 18px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .key:active { transform: scale(0.92) translateY(3px); filter: brightness(1.2); }
    .key:active::after { opacity: 1; }

    /* Distinct gradient per key */
    .key[data-n="1"]  { background: linear-gradient(135deg, #ff4d6d, #c9184a); }
    .key[data-n="2"]  { background: linear-gradient(135deg, #ff9f1c, #e07b00); }
    .key[data-n="3"]  { background: linear-gradient(135deg, #2ec4b6, #0b9b90); }
    .key[data-n="4"]  { background: linear-gradient(135deg, #c77dff, #9b4dca); }
    .key[data-n="5"]  { background: linear-gradient(135deg, #f72585, #b5179e); }
    .key[data-n="6"]  { background: linear-gradient(135deg, #7bdff2, #38b2cc); }
    .key[data-n="7"]  { background: linear-gradient(135deg, #ffe74c, #e0b000); }
    .key[data-n="8"]  { background: linear-gradient(135deg, #6aff6a, #27a027); }
    .key[data-n="9"]  { background: linear-gradient(135deg, #a8dadc, #52a1a5); }
    .key[data-n="0"]  { background: linear-gradient(135deg, #b2f7ef, #3dbfb3); }
    .key.clear        { background: linear-gradient(135deg, #444, #222); font-size: clamp(18px, 4vw, 32px); letter-spacing: -0.5px; }
    .key.clear:active { transform: scale(0.92) translateY(3px); }

    /* 0 and clear span full row nicely */
    .key[data-n="0"] { grid-column: span 1; }

    /* Ripple */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      transform: scale(0);
      animation: ripple-anim 0.5s linear;
      pointer-events: none;
    }
    @keyframes ripple-anim {
      to { transform: scale(4); opacity: 0; }
    }

    /* Floating emoji burst on tap */
    .burst {
      position: fixed;
      font-size: 36px;
      pointer-events: none;
      animation: burst-fly 0.9s ease-out forwards;
      z-index: 999;
    }
    @keyframes burst-fly {
      0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
      100% { transform: translate(-50%, -200%) scale(1.4); opacity: 0; }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="display">
    <div id="digits-wrap"></div>
  </div>
  <div id="keyboard">
    <button class="key" data-n="1">1</button>
    <button class="key" data-n="2">2</button>
    <button class="key" data-n="3">3</button>
    <button class="key" data-n="4">4</button>
    <button class="key" data-n="5">5</button>
    <button class="key" data-n="6">6</button>
    <button class="key" data-n="7">7</button>
    <button class="key" data-n="8">8</button>
    <button class="key" data-n="9">9</button>
    <div></div>
    <button class="key" data-n="0">0</button>
    <button class="key clear" style="grid-column: span 1;">✕ Clear</button>
  </div>
</div>

<script>
  const wrap = document.getElementById('digits-wrap');
  const emojis = ['🌟','🎉','✨','💫','🎈','🦄','🌈','🍭','🎊','⭐'];
  const MAX = 60;

  function addDigit(n) {
    if (wrap.children.length >= MAX) {
      wrap.removeChild(wrap.firstChild);
    }
    const el = document.createElement('span');
    el.className = 'digit-char';
    el.textContent = n;
    wrap.appendChild(el);
    wrap.scrollTop = wrap.scrollHeight;
  }

  function clearAll() {
    wrap.innerHTML = '';
  }

  function spawnBurst(x, y) {
    const el = document.createElement('div');
    el.className = 'burst';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }

  function addRipple(btn, x, y) {
    const rect = btn.getBoundingClientRect();
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    const size = Math.max(rect.width, rect.height);
    ripple.style.width = ripple.style.height = size + 'px';
    ripple.style.left = (x - rect.left - size / 2) + 'px';
    ripple.style.top = (y - rect.top - size / 2) + 'px';
    btn.appendChild(ripple);
    ripple.addEventListener('animationend', () => ripple.remove());
  }

  document.getElementById('keyboard').addEventListener('pointerdown', e => {
    const btn = e.target.closest('.key');
    if (!btn) return;
    const cx = e.clientX, cy = e.clientY;
    addRipple(btn, cx, cy);
    spawnBurst(cx, cy);
    const n = btn.dataset.n;
    if (n !== undefined) {
      addDigit(n);
    } else if (btn.classList.contains('clear')) {
      clearAll();
    }
  });

  // Physical keyboard support
  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') addDigit(e.key);
    if (e.key === 'Backspace' || e.key === 'Delete') clearAll();
  });

  // Register service worker for offline / PWA install
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
</body>
</html>
