<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kid Games</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d1a;
      --surface:   #16162a;
      --border:    rgba(255 255 255 / 0.07);
      --text:      #e8e8f0;
      --muted:     rgba(232 232 240 / 0.45);
      --accent:    #c77dff;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Subtle radial glow at top */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 40% at 50% -10%, rgba(199 125 255 / 0.12), transparent);
      pointer-events: none;
    }

    .page {
      position: relative;
      max-width: 640px;
      margin: 0 auto;
      padding: 64px 24px 80px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 56px;
    }

    .logo {
      font-size: 40px;
      margin-bottom: 16px;
      display: block;
    }

    h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2rem, 6vw, 2.8rem);
      letter-spacing: 0.5px;
      background: linear-gradient(120deg, #fff 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    header p {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    /* ── Card ── */
    .card {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 20px 22px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(199 125 255 / 0.35);
      box-shadow: 0 8px 32px rgba(0 0 0 / 0.4), 0 0 0 1px rgba(199 125 255 / 0.15);
    }

    .card:active {
      transform: translateY(0);
    }

    .card-icon {
      font-size: 2.6rem;
      line-height: 1;
      flex-shrink: 0;
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255 255 255 / 0.05);
      border-radius: 14px;
    }

    .card-body {
      min-width: 0;
    }

    .card-title {
      font-family: 'Fredoka One', cursive;
      font-size: 1.15rem;
      letter-spacing: 0.3px;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-desc {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.5;
    }

    /* ── Footer ── */
    footer {
      margin-top: 72px;
      text-align: center;
      font-size: 0.78rem;
      color: rgba(255 255 255 / 0.18);
    }
  </style>
</head>
<body>
<div class="page">

  <header>
    <span class="logo">🎮</span>
    <h1>Kid Games</h1>
    <p>Simple activities for little hands.<br>Tap a game to play.</p>
  </header>

  <div class="grid">

    <a class="card" href="type/">
      <div class="card-icon">🔢</div>
      <div class="card-body">
        <div class="card-title">Number Fun!</div>
        <div class="card-desc">Tap numbers and watch them pop with color</div>
      </div>
    </a>

    <!-- Future games go here -->

  </div>

  <footer>More games coming soon ✨</footer>

</div>
</body>
</html>
